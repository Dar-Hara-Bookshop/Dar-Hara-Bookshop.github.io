<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful radial gold gradient for premium lighting -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE881" />
      <stop offset="50%" stop-color="#C59216" />
      <stop offset="100%" stop-color="#9A6B0F" />
    </linearGradient>
    <radialGradient id="greenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#145A46" />
      <stop offset="100%" stop-color="#093327" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer circle with smooth emerald gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#greenGrad)" stroke="url(#goldGrad)" stroke-width="12" />
  
  <!-- Subtle Islamic star pattern backdrop -->
  <g opacity="0.12" fill="url(#goldGrad)">
    <path d="M256 90 L280 140 L330 116 L316 170 L370 170 L336 210 L380 240 L330 256 L380 272 L336 302 L370 342 L316 342 L330 396 L280 372 L256 422 L232 372 L182 396 L196 342 L142 342 L176 302 L132 272 L182 256 L132 240 L176 210 L142 170 L196 170 L182 116 L232 140 Z" />
  </g>
  
  <!-- Golden Book and Dome Silhouette (Core Branding Symbol) -->
  <g filter="url(#glow)">
    <!-- Islamic Dome & Crescent Symbol -->
    <path d="M256 120 C220 160 210 200 210 240 L302 240 C302 200 292 160 256 120 Z" fill="url(#goldGrad)" />
    <!-- Crescent top pointer -->
    <path d="M256 95 L256 120 M250 102 L262 102" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Open Book below the dome -->
    <path d="M256 250 L160 280 C150 283 145 292 150 300 L165 375 C167 382 175 385 182 382 L256 350 L330 382 C337 385 345 382 347 375 L362 300 C367 292 362 283 352 280 Z" fill="url(#goldGrad)" />
    
    <!-- Inner page lines/detailing for premium appearance -->
    <path d="M256 265 L180 292 M256 285 L190 310 M256 305 L200 328 M256 325 L210 346" stroke="#093327" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M256 265 L332 292 M256 285 L322 310 M256 305 L312 328 M256 325 L302 346" stroke="#093327" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    
    <!-- Central Divider of the Book -->
    <path d="M256 250 L256 350" stroke="#093327" stroke-width="5" stroke-linecap="round" opacity="0.8" />
  </g>
  
  <!-- Miniature Minarets framing the logo symbol -->
  <path d="M110 230 L125 230 L125 350 L110 350 Z" fill="url(#goldGrad)" opacity="0.75" />
  <path d="M105 230 C105 210 117.5 190 117.5 190 C117.5 190 130 210 130 230 Z" fill="url(#goldGrad)" />
  
  <path d="M387 230 L402 230 L402 350 L387 350 Z" fill="url(#goldGrad)" opacity="0.75" />
  <path d="M382 230 C382 210 394.5 190 394.5 190 C394.5 190 407 210 407 230 Z" fill="url(#goldGrad)" />
</svg>
